<!doctype html>
<html lang="en-US">
   <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <link rel="shorcut icon" href="./favicon.ico" type="image/x-favicon">
    <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Poppins:wght@500;700&display=swap"
    rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css">
    <script defer src="https://kit.fontawesome.com/9571898d36.js" crossorigin="anonymous"></script>
    <script defer src="./script.js"></script>
    <title>Transaction Page</title>
  </head>
  <body>
    <header class="t-header">
      <nav class="t-nav">
        <p class="first--message">Login to get started.</p>
        <img src="./jhay-bank-logo-bg.png" alt="Jhay-Bank-logo" />

        <div class="tSub--nav">
          <form class="t--login">
            <div class="login--input">
              <input required
                type="text"
                class="tuser--name"
                placeholder="user--name"
                maxlength="5"
              />&nbsp;&nbsp;
              <span class="password"><input required
                type="password"
                class="tuser--pin"
                placeholder="user--pin"
                maxlength="4"
                autocomplete="on"
              /><i class="pass-view bi bi-eye"></i></span>
            </div>
            <button type="submit" class="tsign-in">Log In</button>
          </form>
        </div>

        <ul>
          <li><a href="./index.html"><i class="bi bi-house-door-fill"></i></a></a><li>
        </ul>
      </nav>
    </header>

    <main class="t-main">
      <div class="current-balance">
        <div class="currentBal">
          <h2>Current Balance</h2>
          <p>As at <span class="current-date"></span></p>
        </div>

        <p class="total-balance">1000000</p>
      </div>

      <div class="transaction-page">
        <section class="balance-section deposit">
          <div class="balance-content">
            <h3 class="in">One Deposit <span class="mov-date"></span></h3>
            <p class="deposit">1000000</p>
          </div>
        </section>

        <section class="transfer-section">
          <h2>Transfer Money</h2>
          <div class="t-con">
            <div class="t-input">
              <input type="text" maxlength="5" class="recipient" pattern="[A-Za-z ]+" id="recipient" placeholder="Recipient">
              <p>Transfer to:</p>
            </div>
              <div class="t-input">
                <input type="number" class="t-amount" id="t-amount" placeholder="Amount" max="6">
                <p>Amount</p>
            </div>
            <button class="btn-transfer">Send</button>
          </div>
        </section>

        <section class="request-section">
          <h2>Request Loan</h2>
          <div class="r-con">
            <div class="r-input">
              <input type="number" class="request-amount" id="request" placeholder="Amount">
            </div>
            
            <button class="btn-request">Request</button>
          </div>
        </section>

        <section class="close-section">
          <h2>Close Account</h2>
          <div class="c-con">
            <div class="c-input">
              <input type="text" maxlength="5" class="c-user" id="Username" pattern="[A-Za-z ]+" placeholder="Username">
            </div>
            <div class="c-input">
              <input type="password" class="c-pin" id="User-pin" placeholder="Pin" maxlength="4">
            </div>
            <button class="btn-close">Close</button>
          </div>
        </section>
      </div>
      <section class="info">
        <div class="info-con">
          <div>
            <h3 class="in">IN : <span class="money-in"></span></h3>
          </div>

          <div>
            <h3 class="out">OUT : <span class="money-out"></span></h3>
          </div>

          <div>
            <h3 class="interest-rate">RATE :<span class="rate"> 3%</span></h3>
          </div>
        </div>

        <div class="info-con1">
          <div>
            <h3><span class="descend">&darr;</span> SORT <span class="ascend">&uarr;</span></h3>
          </div>


          <div>
            <h3>You'll be logged out in <span class="timer">05:36</span></h3>
          </div>
        </div>
      </section>
    </main>

    <div id="toast" class="toast hide"></div>
    <div id="processing" class="processing hide">
      <span class="p-text">Processing</span>
      <i class="bi bi-arrow-repeat spinner"></i>
    </div>
    <div id="success" class="success hide"></div>
    <div id="error" class="error hide"></div>
    <div id="warning" class="warning hide"></div>
  </body>

</html>
